# =====================================================================
# BitPix — override de PRODUÇÃO
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# Aplica: limites de CPU/memória, no-new-privileges, filesystem read-only,
# logs rotacionados, proxy nginx e serviço de backup.
# NÃO publica Postgres/Redis: acesso apenas pela rede interna.
# NUNCA use `docker compose down -v` (destrói volumes).
# =====================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  logging: *default-logging

services:
  postgres:
    <<: *hardening
    # Sem publicação de porta em produção — somente rede interna.
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1024M }
        reservations: { cpus: "0.5", memory: 256M }

  redis:
    <<: *hardening
    ports: !reset []
    # Autenticação obrigatória em produção (senha via REDIS_PASSWORD).
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--requirepass", "${REDIS_PASSWORD:?defina REDIS_PASSWORD}"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 128M }

  api:
    <<: *hardening
    read_only: true
    tmpfs:
      - /tmp
    # Não publica na rede pública; o nginx faz o proxy.
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "1.5", memory: 768M }
        reservations: { cpus: "0.25", memory: 192M }

  worker:
    <<: *hardening
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 640M }
        reservations: { cpus: "0.25", memory: 192M }

  web:
    <<: *hardening
    read_only: true
    tmpfs:
      - /tmp
      - /app/apps/web/.next/cache
    ports: !reset []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 640M }
        reservations: { cpus: "0.25", memory: 192M }

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    <<: *hardening
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_healthy }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/bitpix.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/bitpix.routes.inc:/etc/nginx/conf.d/bitpix.routes.inc:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 15s
      timeout: 4s
      retries: 6
    networks: [bitpix_internal]

  # Backup agendado do PostgreSQL. Executa scripts/backup.sh dentro do container.
  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    <<: *hardening
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_ENCRYPTION_PASSPHRASE: ${BACKUP_ENCRYPTION_PASSPHRASE:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache aws-cli gnupg coreutils >/dev/null 2>&1 || true
        echo "Serviço de backup ativo. Agende via cron do host chamando: docker compose exec backup /scripts/backup.sh"
        while true; do sleep 3600; done
    volumes:
      - ./scripts:/scripts:ro
      - bitpix_backup_tmp:/backups
    networks: [bitpix_internal]

volumes:
  bitpix_backup_tmp:
