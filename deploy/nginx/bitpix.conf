# =====================================================================
# BitPix — proxy reverso (nginx)
# Roteia: web (Next.js), API REST, SSE, webhook Mercado Pago, health.
# SSE: buffering desligado, timeouts longos. Webhook: corpo original + IP real.
# TLS: descomente o bloco 443 depois de instalar certificados válidos.
# Montado em: deploy/nginx/bitpix.conf -> /etc/nginx/conf.d/default.conf
# =====================================================================

upstream bitpix_api { server api:3333; keepalive 32; }
upstream bitpix_web { server web:3000; keepalive 32; }

# Rate limit específico para o webhook público (não autenticado).
limit_req_zone $binary_remote_addr zone=webhook:10m rate=20r/s;

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# --------- HTTP: redireciona para HTTPS em produção -------------------
server {
  listen 80;
  server_name _;

  # Health do próprio proxy (usado pelo healthcheck do container).
  location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

  # Em produção, descomente para forçar HTTPS:
  # location / { return 301 https://$host$request_uri; }

  include /etc/nginx/conf.d/bitpix.routes.inc;
}

