name: bitpix

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    NEXT_PUBLIC_API_URL: https://bitpix.nextfy.pro/api

x-app-environment: &app-environment
  NODE_ENV: production
  APP_ENV: production
  APP_URL: https://bitpix.nextfy.pro
  API_URL: http://api:3333
  NEXT_PUBLIC_API_URL: https://bitpix.nextfy.pro/api
  API_PORT: "3333"
  DATABASE_URL: ${DATABASE_URL}
  DIRECT_URL: ${DIRECT_URL}
  DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
  REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-bitpix_session}
  SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-8}
  SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-30000}
  PROVIDER_CREDENTIALS_ENCRYPTION_KEY: ${PROVIDER_CREDENTIALS_ENCRYPTION_KEY}
  PAYMENT_PROVIDER_MODE: ${PAYMENT_PROVIDER_MODE:-real}
  PAYMENT_PROVIDER_TIMEOUT_MS: ${PAYMENT_PROVIDER_TIMEOUT_MS:-8000}
  MERCADO_PAGO_API_BASE_URL: https://api.mercadopago.com
  MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
  PUBLIC_WEBHOOK_BASE_URL: https://bitpix.nextfy.pro
  WEBHOOK_LOCAL_FALLBACK: "false"
  WEBHOOK_SIGNATURE_TOLERANCE_SECONDS: ${WEBHOOK_SIGNATURE_TOLERANCE_SECONDS:-300}
  WEBHOOK_MAX_ATTEMPTS: ${WEBHOOK_MAX_ATTEMPTS:-8}
  SSE_MAX_CONNECTIONS_PER_USER: ${SSE_MAX_CONNECTIONS_PER_USER:-5}
  STORAGE_DRIVER: s3
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_REGION: ${S3_REGION}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
  S3_SERVER_SIDE_ENCRYPTION: ${S3_SERVER_SIDE_ENCRYPTION:-none}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM: ${SMTP_FROM}
  REQUIRE_MFA_FOR_PLATFORM: ${REQUIRE_MFA_FOR_PLATFORM:-true}
  REQUIRE_MFA_FOR_ADMINS: ${REQUIRE_MFA_FOR_ADMINS:-true}
  PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-15}

services:
  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - bitpix_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - bitpix_internal

  api:
    image: bitpix-app:latest
    build: *app-build
    restart: unless-stopped
    command: ["npm", "--workspace", "@bitpix/api", "run", "start"]
    environment: *app-environment
    ports:
      - "3334:3333"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3333/health/live"
        ]
      interval: 10s
      timeout: 4s
      retries: 12
      start_period: 30s
    networks:
      - bitpix_internal

  worker:
    image: bitpix-app:latest
    restart: unless-stopped
    command: ["npm", "--workspace", "@bitpix/worker", "run", "start"]
    environment: *app-environment
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - bitpix_internal

  web:
    image: bitpix-app:latest
    restart: unless-stopped
    command: ["npm", "--workspace", "@bitpix/web", "run", "start"]
    environment: *app-environment
    ports:
      - "3003:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/login"
        ]
      interval: 10s
      timeout: 4s
      retries: 12
      start_period: 30s
    networks:
      - bitpix_internal

  migrate:
    image: bitpix-app:latest
    command: ["npm", "run", "db:deploy"]
    environment: *app-environment
    profiles:
      - tools
    networks:
      - bitpix_internal

networks:
  bitpix_internal:
    driver: bridge

volumes:
  bitpix_redis_data:
